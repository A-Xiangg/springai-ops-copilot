server:
  port: 8080

spring:
  application:
    name: springai-ops-copilot
  datasource:
    url: jdbc:
    username: 
    password: 
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  ai:
    openai:
      api-key: 
      base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:qwen-plus}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  chat:
    default-user-id: ${APP_CHAT_DEFAULT_USER_ID:1}
  security:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173

logging:
  level:
    root: ${ROOT_LOG_LEVEL:INFO}
    com.example.opscopilot: ${APP_LOG_LEVEL:INFO}
    org.springframework.ai: ${SPRING_AI_LOG_LEVEL:INFO}
